name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence description of the bug.
      placeholder: "e.g. Activity heatmap shows no data for a known-active wallet"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps that trigger the bug.
      placeholder: |
        1. Enter address 0x...
        2. Click "Deep dive"
        3. Observe activity heatmap is empty
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "The heatmap should show 12 weeks of activity."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "All cells are grey / empty."
    validations:
      required: true

  - type: input
    id: wallet
    attributes:
      label: Wallet address (if relevant)
      description: The address you were inspecting when the bug occurred. Publicly visible on GitHub — only share addresses you're comfortable making public.
      placeholder: "0x... or vitalik.eth"

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production (whales.walletwall.org)
        - Local dev
        - Both
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node version (local dev only)
      placeholder: "e.g. 24.1.0"

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Console errors, screenshots, network responses — anything helpful.
